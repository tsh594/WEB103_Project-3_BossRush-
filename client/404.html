<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 | Lost in the Fog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .missing-page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: clamp(1rem, 4vw, 2.5rem) 1rem;
            position: relative;
            overflow: hidden;
        }

        .missing-page::before,
        .missing-page::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .missing-page::before {
            width: 26rem;
            height: 26rem;
            top: -7rem;
            left: -8rem;
            background: radial-gradient(circle, rgba(39, 230, 255, 0.2), transparent 68%);
        }

        .missing-page::after {
            width: 24rem;
            height: 24rem;
            right: -8rem;
            bottom: -7rem;
            background: radial-gradient(circle, rgba(255, 92, 200, 0.2), transparent 68%);
        }

        .missing-panel {
            width: min(720px, 100%);
            text-align: center;
            animation: rise-in 600ms ease-out both;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(39, 230, 255, 0.24);
            background:
                linear-gradient(180deg, rgba(12, 21, 41, 0.88), rgba(7, 14, 29, 0.9));
            box-shadow: 0 18px 44px rgba(4, 9, 24, 0.72);
        }

        .missing-image-wrap {
            margin: 0 auto 1.2rem;
            max-width: 430px;
            border: 2px solid rgba(39, 230, 255, 0.64);
            border-radius: 0.85rem;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(39, 230, 255, 0.22);
            animation: float-pulse 3.6s ease-in-out infinite;
        }

        .missing-image-wrap img {
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        .missing-badge {
            display: inline-block;
            margin-bottom: 0.35rem;
            padding: 0.22rem 0.7rem;
            border: 1px solid rgba(255, 92, 200, 0.62);
            border-radius: 999px;
            color: #ffd6f0;
            background: rgba(33, 17, 46, 0.58);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .missing-title {
            margin: 0.35rem 0;
            color: var(--neon-cyan);
            text-shadow: 0 0 22px rgba(39, 230, 255, 0.42);
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            font-size: clamp(1.6rem, 4.2vw, 2.5rem);
            letter-spacing: 0.03em;
        }

        .missing-copy {
            margin: 0.35rem auto 1.4rem;
            color: var(--text-muted);
            max-width: 38ch;
        }

        .missing-actions {
            display: flex;
            justify-content: center;
            gap: 0.7rem;
            flex-wrap: wrap;
        }

        .missing-actions a {
            display: inline-block;
            text-decoration: none !important;
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            font-weight: 500;
            font-stretch: 120%;
            letter-spacing: 0.01em;
            font-variation-settings: "wdth" 120;
            text-transform: uppercase;
            font-size: 1.2rem;
            line-height: 1.2;
            padding: 0.5rem 1.7rem;
            background: rgba(7, 28, 50, 0.44);
            color: #5eeaff;
            border: 2.5px solid rgba(85, 233, 255, 0.82);
            border-radius: 0.2rem;
            text-shadow: 0 0 6px rgba(94, 234, 255, 0.35);
            box-shadow: inset 0 0 9px rgba(39, 230, 255, 0.22), 0 0 10px rgba(39, 230, 255, 0.22);
            transition: background-color 140ms ease, color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
        }

        .missing-actions a.ghost {
            background: rgba(11, 21, 41, 0.52);
            color: #d3e8ff;
            border-color: rgba(120, 146, 192, 0.7);
            text-shadow: none;
            box-shadow: none;
        }

        .missing-actions a:hover {
            background: rgba(10, 42, 68, 0.5);
            color: #b8f8ff;
            border-color: rgba(156, 246, 255, 0.98);
            box-shadow: inset 0 0 8px rgba(70, 235, 255, 0.26), 0 0 14px rgba(39, 230, 255, 0.36);
            transform: translateY(-1px);
        }

        .missing-actions a.ghost:hover {
            color: #e6f2ff;
            border-color: rgba(193, 214, 248, 0.95);
            box-shadow: 0 0 14px rgba(173, 200, 240, 0.2);
        }

        @keyframes rise-in {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float-pulse {
            0%, 100% {
                transform: translateY(0);
                box-shadow: 0 0 18px rgba(39, 230, 255, 0.2);
            }
            50% {
                transform: translateY(-7px);
                box-shadow: 0 0 30px rgba(39, 230, 255, 0.34);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .missing-panel,
            .missing-image-wrap {
                animation: none;
            }
        }

        @media (max-width: 600px) {
            .missing-actions {
                flex-direction: column;
            }

            .missing-actions a {
                width: min(100%, 18rem);
            }
        }
    </style>
</head>
<body>
    <main class="container missing-page">
        <section class="detail-panel missing-panel">
            <div class="missing-image-wrap">
                <img src="/assets/BossRush1.png" alt="BossRush neon hero artwork">
            </div>
            <p class="missing-badge">Signal Lost</p>
            <p class="boss-title">ERROR 404</p>
            <h1 class="missing-title">Target Not Found</h1>
            <p class="missing-copy">That boss page does not exist in the archives yet. Return to the bestiary and summon a known threat.</p>
            <div class="missing-actions">
                <a href="/">Return to the Bestiary</a>
                <a class="ghost" href="javascript:history.back()">Go Back</a>
            </div>
        </section>
    </main>
</body>
</html>
